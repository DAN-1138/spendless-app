<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Spendless">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Spendless</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
:root {
  --bg0: #0a0a0a;
  --bg1: #111111;
  --bg2: #1a1a1a;
  --bg3: #222222;
  --border: rgba(255,255,255,0.08);
  --border-mid: rgba(255,255,255,0.14);
  --text0: #f0f0f0;
  --text1: #a8a8a8;
  --text2: #5f5f5f;
  --accent: #53c990;
  --accent-dim: rgba(83,201,144,0.12);
  --red: #ff5f57;
  --nav-h: 74px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  min-height: 100%;
  height: auto;
  background: var(--bg0);
  color: var(--text0);
  font-family: 'DM Sans', system-ui, sans-serif;
  overscroll-behavior: none;
}

body {
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  min-height: 100svh;
  background: var(--bg0);
}

/* SCROLLABLE CONTENT */
.content {
  flex: 1;
  overflow-y: auto;
  padding-top: calc(var(--safe-top) + 10px);
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 6px);
  -webkit-overflow-scrolling: touch;
}

/* VIEWS */
.view {
  display: none;
  padding: 0 0.9rem;
}

.view.active {
  display: block;
}

/* TOP BAR */
.topbar {
  padding: 1.35rem 0.75rem 0.85rem;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.topbar-title {
  font-size: 34px;
  font-weight: 600;
  letter-spacing: -0.8px;
}

.topbar-sub {
  font-size: 15px;
  color: var(--text1);
  font-family: 'DM Mono', monospace;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: rgba(10,10,10,0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
  display: flex;
  padding-top: 8px;
  padding-bottom: calc(var(--safe-bottom) + 10px);
  z-index: 100;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 0 8px;
  gap: 6px;
  cursor: pointer;
  min-height: 56px;
}

.nav-icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-icon svg {
  width: 22px;
  height: 22px;
  stroke: var(--text2);
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: stroke 0.15s;
}

.nav-label {
  font-size: 14px;
  color: var(--text2);
  letter-spacing: 0.1px;
  transition: color 0.15s;
}

.nav-item.active .nav-icon svg {
  stroke: var(--accent);
}

.nav-item.active .nav-label {
  color: var(--accent);
}

/* CARDS */
.card {
  background: var(--bg1);
  border: 0.5px solid var(--border);
  border-radius: 18px;
  padding: 1.3rem 1.35rem;
  margin-bottom: 0.8rem;
}

/* STAT HERO */
.stat-hero {
  padding: 1.4rem 0.75rem 1.5rem;
  text-align: center;
}

.stat-hero-label {
  font-size: 14px;
  color: var(--text2);
  letter-spacing: 1.2px;
  margin-bottom: 12px;
  font-family: 'DM Mono', monospace;
  text-transform: uppercase;
}

.stat-hero-value {
  display: inline-flex;
  align-items: flex-end;
  justify-content: center;
  font-size: 60px;
  font-weight: 300;
  letter-spacing: -2.4px;
  color: var(--text0);
  line-height: 1;
}

.stat-hero-value span {
  font-size: 28px;
  color: var(--text1);
  font-weight: 300;
  margin-left: 8px;
  line-height: 1.15;
}

/* MONTH NAV */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 0.3rem 1rem 0.8rem;
}

.month-nav-btn {
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 50%;
  transition: background 0.1s;
  background: none;
  border: none;
}

.month-nav-btn:active {
  background: var(--bg2);
}

.month-nav-btn svg {
  width: 18px;
  height: 18px;
  stroke: var(--text1);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.month-nav-label {
  flex: 1;
  text-align: center;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.4px;
  color: var(--text0);
}

/* PIE */
.pie-wrap {
  display: flex;
  gap: 1.35rem;
  align-items: center;
}

.pie-canvas-wrap {
  width: 140px;
  height: 140px;
  flex-shrink: 0;
  position: relative;
}

.pie-legend {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.pie-legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.pie-legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.pie-legend-label {
  font-size: 18px;
  color: var(--text1);
  flex: 1;
}

.pie-legend-pct {
  font-size: 16px;
  color: var(--text0);
  font-family: 'DM Mono', monospace;
}

/* AREA BARS */
.area-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.area-bar-label {
  font-size: 18px;
  color: var(--text1);
  width: 100px;
  flex-shrink: 0;
}

.area-bar-track {
  flex: 1;
  height: 6px;
  background: var(--bg3);
  border-radius: 100px;
  overflow: hidden;
}

.area-bar-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
}

.area-bar-amount {
  font-size: 16px;
  color: var(--text1);
  font-family: 'DM Mono', monospace;
  width: 96px;
  text-align: right;
  flex-shrink: 0;
}

/* AREA SECTION HEADER */
.area-section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 0.85rem;
}

.area-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.area-section-title {
  font-size: 20px;
  font-weight: 500;
}

.area-section-total {
  font-size: 16px;
  color: var(--text1);
  font-family: 'DM Mono', monospace;
  margin-left: auto;
}

/* CATEGORY BARS */
.cat-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.cat-bar-label {
  font-size: 16px;
  color: var(--text1);
  width: 132px;
  flex-shrink: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.cat-bar-track {
  flex: 1;
  height: 5px;
  background: var(--bg3);
  border-radius: 100px;
  overflow: hidden;
}

.cat-bar-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
}

.cat-bar-amount {
  font-size: 14px;
  color: var(--text1);
  font-family: 'DM Mono', monospace;
  width: 82px;
  text-align: right;
  flex-shrink: 0;
}

/* FILTER */
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 1rem;
}

.filter-row select {
  flex: 1;
  background: var(--bg1);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  color: var(--text0);
  font-size: 16px;
  padding: 12px 12px;
  font-family: 'DM Sans', sans-serif;
  appearance: none;
  -webkit-appearance: none;
  min-height: 46px;
}

/* TRANSACTIONS */
.tx-month-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 1.8rem 0 0.7rem;
}

.tx-month-header.first {
  padding-top: 1rem;
}

.tx-month-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text0);
  letter-spacing: -0.2px;
}

.tx-month-total {
  font-size: 13px;
  color: var(--text2);
  font-family: 'DM Mono', monospace;
}

.tx-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 15px 0;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  min-height: 56px;
}

.tx-item:last-child {
  border-bottom: none;
}

.tx-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 7px;
}

.tx-main {
  flex: 1;
  min-width: 0;
}

.tx-cat {
  font-size: 17px;
  color: var(--text0);
  line-height: 1.2;
}

.tx-meta {
  font-size: 14px;
  color: var(--text1);
  margin-top: 4px;
}

.tx-date-inline {
  font-size: 13px;
  color: var(--text2);
  font-family: 'DM Mono', monospace;
  margin-top: 5px;
}

.tx-right {
  text-align: right;
  flex-shrink: 0;
  padding-left: 8px;
}

.tx-amount {
  font-size: 17px;
  font-family: 'DM Mono', monospace;
  color: var(--text0);
  white-space: nowrap;
}

/* TOAST */
.toast {
  position: fixed;
  top: calc(var(--safe-top) + 56px);
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--accent);
  color: #0a0a0a;
  padding: 11px 20px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 500;
  z-index: 200;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
  white-space: nowrap;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 150;
  align-items: flex-end;
  justify-content: center;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: var(--bg1);
  border-radius: 20px 20px 0 0;
  border-top: 0.5px solid var(--border);
  padding: 1.25rem 1.25rem calc(1.25rem + var(--safe-bottom));
  width: 100%;
  max-width: 430px;
  max-height: 85vh;
  overflow-y: auto;
}

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--bg3);
  border-radius: 100px;
  margin: 0 auto 1.25rem;
}

.modal-title {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 1.25rem;
}

.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 1rem;
}

.modal-actions .btn {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  border: 0.5px solid var(--border);
  background: var(--bg2);
  color: var(--text0);
  transition: opacity 0.1s;
}

.modal-actions .btn:active {
  opacity: 0.7;
}

.modal-actions .btn-del {
  color: var(--red);
  border-color: rgba(255,95,87,0.2);
  background: rgba(255,95,87,0.08);
}

.modal-actions .btn-save {
  background: var(--accent);
  color: #0a0a0a;
  border-color: var(--accent);
}

.modal .form-group {
  margin-bottom: 1rem;
}

.modal select,
.modal input {
  width: 100%;
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  color: var(--text0);
  font-size: 16px;
  padding: 13px 14px;
  font-family: 'DM Sans', sans-serif;
  appearance: none;
  -webkit-appearance: none;
}

.modal select option {
  background: #1a1a1a;
}

.modal label {
  font-size: 12px;
  color: var(--text2);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
  margin-bottom: 6px;
  display: block;
}

.empty {
  text-align: center;
  padding: 3rem 0;
  color: var(--text2);
  font-size: 15px;
}

.loading {
  text-align: center;
  padding: 2rem 0;
  color: var(--text2);
  font-size: 13px;
  font-family: 'DM Mono', monospace;
}
</style>
</head>
<body>

<div class="content" id="content">

  <div class="view active" id="view-dashboard">
    <div class="topbar">
      <div class="topbar-title">Spendless</div>
    </div>

    <div class="month-nav">
      <button class="month-nav-btn" id="month-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="month-nav-label" id="month-nav-label">—</div>
      <button class="month-nav-btn" id="month-next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>

    <div class="stat-hero">
      <div class="stat-hero-label" id="stat-hero-label">TOTALT —</div>
      <div class="stat-hero-value" id="stat-total">— <span>kr</span></div>
    </div>

    <div id="dash-content">
      <div class="loading">Laddar...</div>
    </div>
  </div>

  <div class="view" id="view-transactions">
    <div class="topbar">
      <div class="topbar-title">Utgifter</div>
    </div>

    <div style="padding-top:0.85rem;">
      <div class="filter-row">
        <select id="filter-area">
          <option value="">Alla områden</option>
          <option>Barn</option>
          <option>Personligt</option>
          <option>Bil</option>
          <option>Hushåll</option>
          <option>Familj</option>
        </select>
        <select id="filter-month-tx">
          <option value="">Alla månader</option>
        </select>
      </div>
    </div>

    <div id="tx-list">
      <div class="loading">Laddar...</div>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <div class="nav-item active" data-view="dashboard">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </div>
    <div class="nav-label">Översikt</div>
  </div>

  <div class="nav-item" data-view="transactions">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </div>
    <div class="nav-label">Utgifter</div>
  </div>
</nav>

<div class="toast" id="toast">Uppdaterad!</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Redigera utgift</div>

    <div class="form-group">
      <label>Område</label>
      <select id="edit-area"></select>
    </div>

    <div class="form-group">
      <label>Kategori</label>
      <select id="edit-category"></select>
    </div>

    <div class="form-group">
      <label>Belopp (kr)</label>
      <input type="number" id="edit-amount" inputmode="numeric">
    </div>

    <div class="form-group">
      <label>Kommentar</label>
      <input type="text" id="edit-comment">
    </div>

    <div class="modal-actions">
      <button class="btn btn-del" id="delete-btn">Ta bort</button>
      <button class="btn btn-save" id="update-btn">Spara</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lgmiwyaxbggugjlfyuhp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HlN1lDzM6qZIdo56Mu8Iag_OKxyW69l';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const AREAS = ['Barn','Personligt','Bil','Hushåll','Familj'];
const CATEGORIES = {
  'Barn': ['Aktiviteter','Kläder','Nöjen','Hälsa','Mat'],
  'Personligt': ['Lunch','Restaurant','Fika','Alkohol','Transport','Shopping','Resor','Hälsa/skönhet','Nöjen'],
  'Bil': ['Parkering','Bensin','Service'],
  'Hushåll': ['Mat','Underhåll'],
  'Familj': ['Aktiviteter','Resor','Restaurant']
};
const AREA_COLORS = {
  'Barn': '#53c990',
  'Personligt': '#60c8f0',
  'Bil': '#f0a060',
  'Hushåll': '#a060f0',
  'Familj': '#f060a0'
};

let allData = [];
let selectedMonth = '';
let editingId = null;
let sortedMonths = [];
let monthIndex = 0;

function fmt(n) {
  return Math.round(n).toLocaleString('sv-SE');
}

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const view = item.dataset.view;
    switchView(view);
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
    item.classList.add('active');
  });
});

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('content').scrollTop = 0;
  if (name === 'transactions') renderTransactions();
  if (name === 'dashboard') renderDashboard();
}

function buildMonthNav() {
  const months = new Set();
  allData.forEach(r => {
    const d = new Date(r.date);
    months.add(d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,'0'));
  });

  sortedMonths = [...months].sort();

  const now = new Date();
  const curKey = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2,'0');

  if (!selectedMonth || !sortedMonths.includes(selectedMonth)) {
    selectedMonth = sortedMonths.includes(curKey) ? curKey : (sortedMonths[sortedMonths.length - 1] || '');
  }

  monthIndex = sortedMonths.indexOf(selectedMonth);
  updateMonthNavUI();

  const txSel = document.getElementById('filter-month-tx');
  const cur = txSel.value;
  txSel.innerHTML = '<option value="">Alla månader</option>';

  [...sortedMonths].reverse().forEach(m => {
    const [y, mo] = m.split('-');
    const label = new Date(y, mo - 1).toLocaleString('sv-SE', { month: 'long', year: 'numeric' });
    const o = document.createElement('option');
    o.value = m;
    o.textContent = label.charAt(0).toUpperCase() + label.slice(1);
    if (m === cur) o.selected = true;
    txSel.appendChild(o);
  });
}

function updateMonthNavUI() {
  if (!sortedMonths.length) return;
  const [y, mo] = sortedMonths[monthIndex].split('-');
  const monthName = new Date(y, mo - 1).toLocaleString('sv-SE', { month: 'long' });
  document.getElementById('month-nav-label').textContent =
    monthName.charAt(0).toUpperCase() + monthName.slice(1) + ' ' + y;
  document.getElementById('month-prev').style.opacity = monthIndex > 0 ? '1' : '0.2';
  document.getElementById('month-next').style.opacity = monthIndex < sortedMonths.length - 1 ? '1' : '0.2';
}

document.getElementById('month-prev').addEventListener('click', () => {
  if (monthIndex > 0) {
    monthIndex--;
    selectedMonth = sortedMonths[monthIndex];
    updateMonthNavUI();
    renderDashboard();
  }
});

document.getElementById('month-next').addEventListener('click', () => {
  if (monthIndex < sortedMonths.length - 1) {
    monthIndex++;
    selectedMonth = sortedMonths[monthIndex];
    updateMonthNavUI();
    renderDashboard();
  }
});

function getMonthData() {
  if (!selectedMonth) return allData;
  return allData.filter(r => {
    const d = new Date(r.date);
    const m = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,'0');
    return m === selectedMonth;
  });
}

function renderDashboard() {
  const data = getMonthData();
  const total = data.reduce((s, r) => s + r.amount, 0);

  if (selectedMonth) {
    const [y, mo] = selectedMonth.split('-');
    const monthName = new Date(y, mo - 1).toLocaleString('sv-SE', { month: 'long' });
    document.getElementById('stat-hero-label').textContent =
      'TOTALT ' + (monthName.charAt(0).toUpperCase() + monthName.slice(1)).toUpperCase();
  }

  document.getElementById('stat-total').innerHTML = `${fmt(total)} <span>kr</span>`;

  const container = document.getElementById('dash-content');
  if (!data.length) {
    container.innerHTML = '<div class="empty">Inga poster denna period</div>';
    return;
  }

  const areaTotals = {};
  AREAS.forEach(a => areaTotals[a] = 0);
  data.forEach(r => {
    if (areaTotals[r.area] !== undefined) areaTotals[r.area] += r.amount;
  });

  const maxArea = Math.max(...Object.values(areaTotals));
  const catTotals = {};

  data.forEach(r => {
    if (!catTotals[r.area]) catTotals[r.area] = {};
    catTotals[r.area][r.category] = (catTotals[r.area][r.category] || 0) + r.amount;
  });

  let html = '';

  const pieAreas = AREAS.filter(a => areaTotals[a] > 0);

  html += `<div class="card" style="margin-bottom:0.85rem;">
    <div class="pie-wrap">
      <div class="pie-canvas-wrap"><canvas id="pie-chart"></canvas></div>
      <div class="pie-legend">`;

  pieAreas.forEach(a => {
    const pct = total > 0 ? Math.round(areaTotals[a] / total * 100) : 0;
    html += `<div class="pie-legend-item">
      <div class="pie-legend-dot" style="background:${AREA_COLORS[a]}"></div>
      <div class="pie-legend-label">${a}</div>
      <div class="pie-legend-pct">${pct} %</div>
    </div>`;
  });

  html += `</div></div></div>`;

  html += `<div class="card" style="margin-bottom:0.85rem;">`;
  AREAS.forEach(a => {
    if (areaTotals[a] === 0) return;
    const pct = maxArea > 0 ? (areaTotals[a] / maxArea * 100) : 0;
    html += `<div class="area-bar-row">
      <div class="area-bar-label">${a}</div>
      <div class="area-bar-track"><div class="area-bar-fill" style="width:${pct}%;background:${AREA_COLORS[a]}"></div></div>
      <div class="area-bar-amount">${fmt(areaTotals[a])} kr</div>
    </div>`;
  });
  html += `</div>`;

  AREAS.forEach(a => {
    if (!catTotals[a]) return;
    const cats = catTotals[a];
    const areaTotal = areaTotals[a];
    const maxCat = Math.max(...Object.values(cats));
    const orderedCats = (CATEGORIES[a] || []).filter(c => cats[c]);

    html += `<div class="card" style="margin-bottom:0.85rem;">
      <div class="area-section-header">
        <div class="area-dot" style="background:${AREA_COLORS[a]}"></div>
        <div class="area-section-title">${a}</div>
        <div class="area-section-total">${fmt(areaTotal)} kr</div>
      </div>`;

    orderedCats.forEach(c => {
      const pct = maxCat > 0 ? (cats[c] / maxCat * 100) : 0;
      html += `<div class="cat-bar-row">
        <div class="cat-bar-label">${c}</div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${AREA_COLORS[a]}88"></div></div>
        <div class="cat-bar-amount">${fmt(cats[c])} kr</div>
      </div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;

  new Chart(document.getElementById('pie-chart'), {
    type: 'doughnut',
    data: {
      labels: pieAreas,
      datasets: [{
        data: pieAreas.map(a => areaTotals[a]),
        backgroundColor: pieAreas.map(a => AREA_COLORS[a]),
        borderWidth: 0,
        hoverOffset: 4
      }]
    },
    options: {
      cutout: '65%',
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      responsive: true,
      maintainAspectRatio: true
    }
  });
}

function renderTransactions() {
  const area = document.getElementById('filter-area').value;
  const month = document.getElementById('filter-month-tx').value;

  let data = allData.filter(r => {
    if (area && r.area !== area) return false;
    if (month) {
      const d = new Date(r.date);
      const m = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,'0');
      if (m !== month) return false;
    }
    return true;
  });

  const list = document.getElementById('tx-list');
  if (!data.length) {
    list.innerHTML = '<div class="empty">Inga poster</div>';
    return;
  }

  const groups = {};
  data.forEach(r => {
    const d = new Date(r.date);
    const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,'0');
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  let html = '';
  const keys = Object.keys(groups).sort().reverse();

  keys.forEach((key, idx) => {
    const [y, mo] = key.split('-');
    const label = new Date(y, mo - 1).toLocaleString('sv-SE', { month: 'long', year: 'numeric' });
    const groupTotal = groups[key].reduce((s, r) => s + r.amount, 0);

    html += `<div class="tx-month-header ${idx === 0 ? 'first' : ''}">
      <div class="tx-month-title">${label.charAt(0).toUpperCase() + label.slice(1)}</div>
      <div class="tx-month-total">${fmt(groupTotal)} kr</div>
    </div>`;

    groups[key].forEach((r, i) => {
      const d = new Date(r.date);
      const dateText = d.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
      const isLast = i === groups[key].length - 1;

      html += `<div class="tx-item" data-id="${r.id}" style="${isLast ? 'border-bottom:none;' : ''}">
        <div class="tx-dot" style="background:${AREA_COLORS[r.area]}"></div>
        <div class="tx-main">
          <div class="tx-cat">${r.category}</div>
          <div class="tx-meta">${r.area}${r.comment ? ' · ' + r.comment : ''}</div>
          <div class="tx-date-inline">${dateText}</div>
        </div>
        <div class="tx-right">
          <div class="tx-amount">${fmt(r.amount)} kr</div>
        </div>
      </div>`;
    });
  });

  list.innerHTML = html;

  list.querySelectorAll('.tx-item').forEach(el => {
    el.addEventListener('click', () => openEdit(el.dataset.id));
  });
}

document.getElementById('filter-area').addEventListener('change', renderTransactions);
document.getElementById('filter-month-tx').addEventListener('change', renderTransactions);

function openEdit(id) {
  const r = allData.find(x => x.id === id);
  if (!r) return;
  editingId = id;

  const areaEl = document.getElementById('edit-area');
  areaEl.innerHTML = AREAS.map(a => `<option${a===r.area ? ' selected' : ''}>${a}</option>`).join('');
  populateEditCats(r.area, r.category);

  document.getElementById('edit-amount').value = r.amount;
  document.getElementById('edit-comment').value = r.comment || '';
  document.getElementById('modal').classList.add('open');
}

function populateEditCats(area, selected) {
  const catEl = document.getElementById('edit-category');
  catEl.innerHTML = (CATEGORIES[area] || []).map(c => `<option${c===selected ? ' selected' : ''}>${c}</option>`).join('');
}

document.getElementById('edit-area').addEventListener('change', function() {
  populateEditCats(this.value, '');
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
});

document.getElementById('update-btn').addEventListener('click', async () => {
  const area = document.getElementById('edit-area').value;
  const cat = document.getElementById('edit-category').value;
  const amt = parseInt(document.getElementById('edit-amount').value);
  const comment = document.getElementById('edit-comment').value.trim();

  const { error } = await sb
    .from('expenses')
    .update({ area, category: cat, amount: amt, comment: comment || null })
    .eq('id', editingId);

  if (error) {
    alert('Fel: ' + error.message);
    return;
  }

  document.getElementById('modal').classList.remove('open');
  showToast('Uppdaterad!');
  await loadData();
  renderTransactions();
});

document.getElementById('delete-btn').addEventListener('click', async () => {
  if (!confirm('Ta bort denna post?')) return;

  const { error } = await sb.from('expenses').delete().eq('id', editingId);

  if (error) {
    alert('Fel: ' + error.message);
    return;
  }

  document.getElementById('modal').classList.remove('open');
  showToast('Borttagen');
  await loadData();
  renderTransactions();
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

async function loadData() {
  const { data, error } = await sb
    .from('expenses')
    .select('*')
    .order('date', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  allData = data || [];
  buildMonthNav();
  renderDashboard();
}

loadData();
</script>
</body>
</html>
